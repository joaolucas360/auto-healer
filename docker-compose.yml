services:
  victim-app:
    build: ./victim-app
    container_name: victim-app
    restart: unless-stopped
    environment:
      - CHAOS_TOKEN=${CHAOS_TOKEN:-}
      - HANG_DELAY_SECONDS=${HANG_DELAY_SECONDS:-10}
    ports:
      - "8000:8000"
    mem_limit: 256m
    cpus: 0.5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=6h'
    ports:
      - "9090:9090"
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      victim-app:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_PLUGINS_ENABLE_ALPHA=false
      - GF_AUTO_UPDATE_PLUGINS=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_PLUGINS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      - prometheus

  healer:
    build: ./healer
    container_name: healer
    restart: unless-stopped
    group_add:
      - "${DOCKER_GID:-991}"
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - VICTIM_CONTAINER=${VICTIM_CONTAINER:-victim-app}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-10}
      - MEMORY_LEAK_THRESHOLD=${MEMORY_LEAK_THRESHOLD:-100000000}
      - HUNG_THRESHOLD=${HUNG_THRESHOLD:-1}
      - PROMETHEUS_TIMEOUT_SECONDS=${PROMETHEUS_TIMEOUT_SECONDS:-5}
      - RESTART_COOLDOWN_SECONDS=${RESTART_COOLDOWN_SECONDS:-60}
      - STARTUP_DELAY_SECONDS=${STARTUP_DELAY_SECONDS:-15}
      - INCIDENT_LOG_PATH=${INCIDENT_LOG_PATH:-/app/incidents/incidents.json}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./incidents:/app/incidents
    mem_limit: 128m
    cpus: 0.3
    depends_on:
      prometheus:
        condition: service_started
      victim-app:
        condition: service_healthy

volumes:
  prometheus_data:
  grafana_data:
